<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Admin | KDP ULYXEOS</title>
  <link rel="stylesheet" href="/static/style.css">

  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  
</head>


<script>
  window.fbAsyncInit = function() {
    FB.init({
      appId      : '{your-app-id}',
      cookie     : true,
      xfbml      : true,
      version    : '{api-version}'
    });
      
    FB.AppEvents.logPageView();   
      
  };

  (function(d, s, id){
     var js, fjs = d.getElementsByTagName(s)[0];
     if (d.getElementById(id)) {return;}
     js = d.createElement(s); js.id = id;
     js.src = "https://connect.facebook.net/en_US/sdk.js";
     fjs.parentNode.insertBefore(js, fjs);
   }(document, 'script', 'facebook-jssdk'));
</script>
  
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="badge">🔐 Zone sécurisée</div>
      <h1 class="login-title">Admin KDP ULYXEOS</h1>
      <div class="login-subtitle">
        Connecte-toi pour gérer l’autopost, les médias, l’historique et le moteur de contenu.
      </div>

      <form method="post" action="/admin/login">
        <div>
          <label for="email">Email admin</label>
          <input id="email" type="email" name="email" placeholder="contact@ulyxeos.com" required>
        </div>

        <div>
          <label for="password">Mot de passe</label>
          <input id="password" type="password" name="password" placeholder="••••••••••••" required>
        </div>

        <button type="submit">Se connecter</button>
      </form>

      <div class="footer-note">
        Interface privée réservée à l’administration du module social.
      </div>
    </div>
  </div>
</body>
</html>
